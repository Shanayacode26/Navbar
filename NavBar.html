<html>
    <head>
        <title>NavBar</title>
        <style>
            body{
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .topnav{
                overflow: hidden;
                background-color: rgb(119, 175, 224);
            }
            .topnav a{
                float: left;
                color: rgb(255, 255, 255);
                text-align: center;
                padding: 14px 16px;
                text-decoration: none;
                font-size: 17px;                
            }
            .topnav a:hover{
                background-color: rgb(246, 246, 142);
            }
            .topnav a.active{
                background-color: rgb(133, 248, 113);
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="topnav">
        <a href="" class="active">Home</a>
          <a href="">About Us</a>
          <a href="">Gallery</a>
          <a href="">Contact Us</a>
        </div>
    </body>
</html>
